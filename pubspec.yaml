name: hoku
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  add_2_calendar: ^3.1.1
  curved_navigation_bar: ^1.0.6
  flutter:
    sdk: flutter
  html: ^0.15.6
  http: ^1.6.0
  intl: ^0.20.2
  path: ^1.9.1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/icon/class/
    - assets/icon/lane/
    - assets/database/hoku.db
    - assets/database/items.json

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "path/to/image.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "path/to/image.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "path/to/image.png"
